services:
  rabbitmq:
    ports: !reset []

  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  rss-fetcher:
    build:
      context: ./services
      dockerfile: rss-fetcher/Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      POSTGRES_URL: jdbc:postgresql://postgres:5432/newsmind
      POSTGRES_USERNAME: newsmind
      POSTGRES_PASSWORD: newsmind
      LOG_LEVEL: WARN
      JAVA_OPTS: -Xms128m -Xmx256m
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      api-gateway:
        condition: service_healthy

  embedding-service:
    build:
      context: ./services
      dockerfile: embedding-service/Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      POSTGRES_URL: jdbc:postgresql://postgres:5432/newsmind
      POSTGRES_USERNAME: newsmind
      POSTGRES_PASSWORD: newsmind
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      LOG_LEVEL: WARN
      JAVA_OPTS: -Xms128m -Xmx256m
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      api-gateway:
        condition: service_healthy

  query-service:
    build:
      context: ./services
      dockerfile: query-service/Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      POSTGRES_URL: jdbc:postgresql://postgres:5432/newsmind
      POSTGRES_USERNAME: newsmind
      POSTGRES_PASSWORD: newsmind
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_CHAT_MODEL: gpt-4o-mini
      MAX_CONTEXT_ARTICLES: 5
      QUERY_CACHE_TTL_SECONDS: 1800
      LOG_LEVEL: WARN
      JAVA_OPTS: -Xms128m -Xmx256m
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-gateway:
        condition: service_healthy

  api-gateway:
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      POSTGRES_URL: jdbc:postgresql://postgres:5432/newsmind
      POSTGRES_USERNAME: newsmind
      POSTGRES_PASSWORD: newsmind
      QUERY_TIMEOUT_SECONDS: 30
      CORS_ALLOWED_ORIGINS: https://newsmind.media,https://www.newsmind.media
      LOG_LEVEL: WARN
      JAVA_OPTS: -Xms128m -Xmx256m
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:80"
    restart: always
    depends_on:
      - api-gateway
