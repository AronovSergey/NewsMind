spring:
  application:
    name: api-gateway
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/newsmind}
    username: ${POSTGRES_USERNAME:newsmind}
    password: ${POSTGRES_PASSWORD:newsmind}

query:
  timeout-seconds: ${QUERY_TIMEOUT_SECONDS:30}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.newsmind: ${LOG_LEVEL:INFO}
