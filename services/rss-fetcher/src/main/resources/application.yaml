server:
  port: 8081

spring:
  application:
    name: rss-fetcher
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/newsmind}
    username: ${POSTGRES_USERNAME:newsmind}
    password: ${POSTGRES_PASSWORD:newsmind}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health

feeds:
  sources:
    - url: "https://feeds.bbci.co.uk/news/rss.xml"
      name: "BBC News"
    - url: "https://techcrunch.com/feed/"
      name: "TechCrunch"
    - url: "https://feeds.npr.org/1001/rss.xml"
      name: "NPR News"
    - url: "https://www.theverge.com/rss/index.xml"
      name: "The Verge"
    - url: "https://hnrss.org/frontpage"
      name: "Hacker News"
    - url: "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"
      name: "NY Times"

logging:
  level:
    com.newsmind: ${LOG_LEVEL:INFO}
