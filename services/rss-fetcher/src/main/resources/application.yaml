spring:
  application:
    name: rss-fetcher
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/newsmind}
    username: ${POSTGRES_USERNAME:newsmind}
    password: ${POSTGRES_PASSWORD:newsmind}
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.newsmind: ${LOG_LEVEL:INFO}
