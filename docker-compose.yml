services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: newsmind
      POSTGRES_USER: newsmind
      POSTGRES_PASSWORD: newsmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsmind -d newsmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rss-fetcher:
    build:
      context: ./services
      dockerfile: rss-fetcher/Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      POSTGRES_URL: jdbc:postgresql://postgres:5432/newsmind
      POSTGRES_USERNAME: newsmind
      POSTGRES_PASSWORD: newsmind
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx256m}
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  embedding-service:
    build:
      context: ./services
      dockerfile: embedding-service/Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      POSTGRES_URL: jdbc:postgresql://postgres:5432/newsmind
      POSTGRES_USERNAME: newsmind
      POSTGRES_PASSWORD: newsmind
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx256m}
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  query-service:
    build:
      context: ./services
      dockerfile: query-service/Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      POSTGRES_URL: jdbc:postgresql://postgres:5432/newsmind
      POSTGRES_USERNAME: newsmind
      POSTGRES_PASSWORD: newsmind
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_CHAT_MODEL: gpt-4o-mini
      MAX_CONTEXT_ARTICLES: 5
      QUERY_CACHE_TTL_SECONDS: 1800
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx256m}
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      POSTGRES_URL: jdbc:postgresql://postgres:5432/newsmind
      POSTGRES_USERNAME: newsmind
      POSTGRES_PASSWORD: newsmind
      QUERY_TIMEOUT_SECONDS: 30
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost,https://newsmind.media,https://www.newsmind.media
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx256m}
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:80"
    restart: always
    depends_on:
      - api-gateway

volumes:
  postgres_data:
